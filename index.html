<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Essence Studio | Pasaporte</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffb6c1">
    
    <!-- CSS (Tailwind por CDN para estilado rápido) e Íconos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <!-- OneSignal SDK -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "13d38867-03ad-4522-ba18-d7dd224ea2bd",
        });
      });
    </script>
</head>
<body class="bg-pink-50 text-gray-800 font-sans antialiased">

    <!-- CONTENEDOR PRINCIPAL -->
    <div id="app" class="max-w-md mx-auto bg-white min-h-screen shadow-lg relative overflow-hidden">
        
        <!-- PANTALLA DE CARGA -->
        <div id="loader" class="absolute inset-0 bg-white z-50 flex flex-col items-center justify-center transition-opacity duration-300">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-pink-500 mb-4"></div>
            <p class="text-pink-600 font-medium animate-pulse">Conectando con Essence...</p>
        </div>

        <!-- PANTALLA 1: LOGIN / REGISTRO -->
        <div id="login-screen" class="hidden flex-col items-center justify-center min-h-screen p-6">
            <img src="https://via.placeholder.com/150x50?text=LOGO+ESSENCE" alt="Essence Logo" class="mb-8">
            <h2 class="text-2xl font-bold mb-6 text-center text-gray-700">Tu Pasaporte de Belleza</h2>
            
            <div class="w-full bg-pink-50 p-6 rounded-2xl shadow-sm border border-pink-100">
                <label class="block text-sm font-semibold mb-2">Ingresa tu número de WhatsApp</label>
                <div class="flex gap-2">
                    <span class="inline-flex items-center px-3 bg-white border border-gray-300 rounded-l-lg text-gray-500">+51</span>
                    <input type="tel" id="input-telefono" placeholder="Ej. 987654321" class="flex-1 px-4 py-2 border border-gray-300 rounded-r-lg focus:outline-none focus:ring-2 focus:ring-pink-400">
                </div>
                <button id="btn-ingresar" class="w-full mt-6 bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 rounded-xl shadow-md transition-colors">
                    Ingresar
                </button>
            </div>
            <p class="text-xs text-center text-gray-400 mt-6">Al ingresar aceptas recibir notificaciones de tus premios.</p>
        </div>

        <!-- PANTALLA 2: EL PASAPORTE (DASHBOARD) -->
        <div id="dashboard-screen" class="hidden flex-col min-h-screen p-6">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-xl font-bold">¡Hola, <span id="user-name" class="text-pink-600">Preciosa</span>! ✨</h1>
                    <p class="text-sm text-gray-500">Llevas <span id="user-points" class="font-bold">0</span>/10 stickers</p>
                </div>
                <button id="btn-logout" class="text-gray-400 hover:text-pink-500 transition-colors">
                    <i class="fas fa-sign-out-alt text-xl"></i>
                </button>
            </div>

            <!-- Grilla de Stickers -->
            <div class="bg-white p-6 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-pink-50 relative">
                <div class="grid grid-cols-5 gap-3" id="stickers-grid">
                    <!-- Los stickers se generan desde app.js -->
                </div>
                <div class="mt-6 p-4 bg-pink-50 rounded-xl text-center">
                    <p class="text-sm font-medium text-pink-700" id="mensaje-meta">¡Te faltan X stickers para tu descuento!</p>
                </div>
            </div>

            <!-- Botón de Suscripción Notificaciones -->
            <button id="btn-notificaciones" class="mt-8 bg-gray-900 text-white py-3 px-4 rounded-xl flex items-center justify-center gap-2 shadow-lg hidden">
                <i class="fas fa-bell"></i> Activar alertas de premios
            </button>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
