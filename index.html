<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Essence Studio | Pasaporte</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#F9EFEE">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Essence">
  <link rel="apple-touch-icon" href="icon.png">

  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #F9EFEE; }
    .iframe-container { width: 100%; height: 100%; overflow: hidden; position: relative; }
    /* Ajuste para que el iframe ocupe todo sin bordes blancos */
    iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
  </style>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>
  
  <div id="scanner-modal" style="display:none; position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,0.85); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); font-family:-apple-system,sans-serif; flex-direction:column; align-items:center; justify-content:center; padding:24px;">
    <div style="background:white; width:100%; max-width:360px; padding:24px; border-radius:28px; box-shadow:0 20px 40px rgba(0,0,0,0.3); text-align:center; border:1px solid rgba(255,255,255,0.8);">
      <h3 style="color:#8A7175; margin-top:0; margin-bottom:16px; font-weight:600; font-size:18px;">Escanea tu código de sello</h3>
      <div id="reader" style="width:100%; border-radius:20px; overflow:hidden; background:black;"></div>
      <button onclick="cerrarEscanerNativo()" style="width:100%; margin-top:20px; background:#8A7175; color:white; border:none; padding:15px; border-radius:980px; font-weight:bold; font-size:14px; transition:all 0.2s; cursor:pointer;">Cancelar</button>
    </div>
  </div>
  
  <div class="iframe-container">
    <iframe id="app-frame" src="" allow="camera *; microphone *; autoplay *;"></iframe>
  </div>

  <!-- AQUI FALTABA ESTA ETIQUETA: -->
  <script>
    const scriptUrl = "https://script.google.com/macros/s/AKfycbzGIz3_S6rpYJ3U9WBo4VKnBCsV0a7veVGaHCJN9-uoBlfa6RtLVhrP0VOLG3Ja8cMr/exec";
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token') || "";
    
    const savedClientId = localStorage.getItem('essence_client_id') || "";
    
    let finalUrl = scriptUrl + "?token=" + token;
    if (savedClientId) {
      finalUrl += "&client_id=" + savedClientId;
    }
    document.getElementById('app-frame').src = finalUrl;

    // ESCUCHA DE MENSAJES DESDE GOOGLE APPS SCRIPT
    let html5QrcodeScanner = null;

    window.addEventListener('message', function(event) {
      if (event.data && event.data.type === 'SAVE_ID') {
        localStorage.setItem('essence_client_id', event.data.id);
      }
      // Nueva orden: Abrir cámara desde la capa superior
      if (event.data && event.data.type === 'OPEN_SCANNER') {
        abrirEscanerNativo();
      }
    });

    function abrirEscanerNativo() {
      document.getElementById('scanner-modal').style.display = 'flex';
      html5QrcodeScanner = new Html5Qrcode("reader");
      
      const config = { fps: 12, qrbox: { width: 250, height: 250 } };
      
      html5QrcodeScanner.start({ facingMode: "environment" }, config, (decodedText) => {
        try {
          const url = new URL(decodedText);
          const scannedToken = url.searchParams.get("token");
          if (scannedToken) {
            document.getElementById('app-frame').contentWindow.postMessage({ type: 'QR_SCANNED', token: scannedToken }, '*');
            cerrarEscanerNativo();
          } else {
            alert("El código QR escaneado no pertenece a un sello válido.");
          }
        } catch(e) {
          alert("Código escaneado no válido.");
        }
      }).then(() => {
        // AVISO DE ÉXITO: Le avisa a Google que la cámara ya está encendida en la capa superior
        document.getElementById('app-frame').contentWindow.postMessage({ type: 'CAMERA_READY_ONBOARDING' }, '*');
      }).catch(err => {
        alert("Por favor, permite el acceso a la cámara en la configuración de tu teléfono para poder escanear.");
        cerrarEscanerNativo();
      });
    }

    function cerrarEscanerNativo() {
      document.getElementById('scanner-modal').style.display = 'none';
      if (html5QrcodeScanner) {
        html5QrcodeScanner.stop().then(() => { html5QrcodeScanner = null; }).catch(e => {});
      }
    }

    // Escuchar si la app pide abrir el permiso nativo (RESPALDO POR SI ACASO)
    window.addEventListener('message', function(event) {
      if (event.data && event.data.type === 'REQUEST_CAMERA') {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
          .then(function(stream) {
            stream.getTracks().forEach(track => track.stop());
            document.getElementById('app-frame').contentWindow.postMessage({ type: 'CAMERA_GRANTED' }, '*');
          })
          .catch(function(err) {
            document.getElementById('app-frame').contentWindow.postMessage({ type: 'CAMERA_DENIED' }, '*');
          });
      }
    });

    // Activamos el motor PWA para que se pueda instalar en el teléfono
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(registration => console.log('ServiceWorker registrado con éxito.'))
          .catch(err => console.log('Fallo en ServiceWorker: ', err));
      });
    }
  </script>

</body>
</html>
