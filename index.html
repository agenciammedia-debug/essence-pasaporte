<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Essence Studio | Pasaporte</title>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #F9EFEE; }
    .iframe-container { width: 100%; height: 100%; overflow: hidden; position: relative; }
    iframe { position: absolute; top: -36px; left: 0; width: 100%; height: calc(100% + 36px); border: none; }
  </style>
</head>
<body>

  <div class="iframe-container">
    <iframe id="app-frame" src=""></iframe>
  </div>

  <script>
    const scriptUrl = "https://script.google.com/macros/s/AKfycbzWWyilV2vP41okjKIDpOWPbYbH6ZYOW3D_TIT1VFTi9I3zRyai-_SWiDT0Fi_VMbf_/exec";
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token') || "";
    
    // 1. GitHub lee la memoria (Safari NUNCA borra esta)
    const savedClientId = localStorage.getItem('essence_client_id') || "";
    
    // 2. Le inyectamos el token y la memoria a Google
    let finalUrl = scriptUrl + "?token=" + token;
    if (savedClientId) {
      finalUrl += "&client_id=" + savedClientId;
    }
    document.getElementById('app-frame').src = finalUrl;

    // 3. Escuchamos a Google para saber cuándo guardar a alguien nuevo
    window.addEventListener('message', function(event) {
      if (event.data && event.data.type === 'SAVE_ID') {
        localStorage.setItem('essence_client_id', event.data.id);
      }
    });
  </script>

</body>
</html>
