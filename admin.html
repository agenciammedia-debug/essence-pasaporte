<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Essence Studio | Admin</title>
<link rel="preconnect" href="https://script.google.com" crossorigin>
<style>
  body,html{margin:0;padding:0;height:100%;background:#F9EFEE;font-family:-apple-system,sans-serif;overflow:hidden;}
  iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
  #loader{position:fixed;inset:0;background:#F9EFEE;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .3s ease;z-index:10;}
  .spinner{width:40px;height:40px;border:4px solid rgba(217,136,154,.2);border-top-color:#D9889A;border-radius:50%;animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
  <div id="loader"><div class="spinner"></div></div>
  <iframe id="admin-frame" src=""></iframe>
  <script>
    const scriptUrl = "https://script.google.com/macros/s/AKfycbxVe5W-WVs-YO8C9G6UFW3pO0S2Z8JhHyfwMfV_IAUCjPaEsbI0ZmsN74v_EAiSiFke/exec";
    const iframe = document.getElementById('admin-frame');
    iframe.onload = () => {
      const loader = document.getElementById('loader');
      loader.style.opacity = '0';
      setTimeout(() => loader.style.display = 'none', 300);
    };
    iframe.src = scriptUrl + "?admin=true&t=" + Date.now();
  </script>
</body>
</html>
